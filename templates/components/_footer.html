<footer class="mt-16 border-t border-line/80 bg-white/70 backdrop-blur">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
    <div class="flex flex-col gap-6 sm:flex-row sm:items-center sm:justify-between">
      <div>
        <p class="font-display text-2xl text-ink">FileShare</p>
        <p class="text-sm text-soft mt-1">Partage de fichiers simple, propre et securise.</p>
      </div>
      <div class="flex items-center gap-4 text-sm text-soft">
        <a href="{{ url_for('home') }}" class="hover:text-ink transition-colors">Public</a>
        {% if session.user %}
          <a href="{{ url_for('dashboard') }}" class="hover:text-ink transition-colors">Dashboard</a>

        {% else %}
          <a href="{{ url_for('login') }}" class="hover:text-ink transition-colors">Connexion</a>
        {% endif %}
      </div>
    </div>
    <div class="mt-8 pt-6 border-t border-line/70 text-xs text-soft flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2">
      <span>© 2026 FileShare</span>
      <span class="inline-flex items-center gap-2">
        <span class="h-2 w-2 rounded-full bg-accentDeep"></span>
        Systeme operationnel
      </span>
    </div>
  </div>
